name: Build SAI APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Fix Repositories # 关键步骤：修复仓库地址
        run: |
          # 将所有 jcenter() 替换为 mavenCentral()，并确保 google() 在最前面
          sed -i 's/jcenter()/mavenCentral()/g' build.gradle
          sed -i 's/google()/google()\n        mavenCentral()/g' build.gradle
          # 针对 Shizuku 可能需要的额外仓库（如果项目里没写的话）
          sed -i "/repositories {/a \        maven { url 'https://jitpack.io' }" build.gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SAI-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
